name = "football-platform-api-demo"
main = "src/cloudflare/worker.ts"
compatibility_date = "2026-07-09"
workers_dev = true

[secrets]
required = ["DATABASE_URL"]

[[containers]]
class_name = "ApiContainer"
image = "./Dockerfile"
max_instances = 1

[[durable_objects.bindings]]
name = "API_CONTAINER"
class_name = "ApiContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ApiContainer"]
