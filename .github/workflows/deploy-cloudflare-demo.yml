name: Deploy Cloudflare Demo

on:
  workflow_dispatch:
    inputs:
      seed:
        description: Seed Almanac demo data
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-demo
  cancel-in-progress: false

jobs:
  deploy:
    name: Validate and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: demo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Build application
        run: pnpm run build

      - name: Validate database migration history
        run: pnpm db:check

      - name: Apply demo database migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed Almanac demo data
        if: ${{ inputs.seed }}
        run: pnpm db:seed:almanac
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ASSET_BASE_URL: https://pub-ad9a25475486494b8665c0b11bd920ca.r2.dev

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: deploy
